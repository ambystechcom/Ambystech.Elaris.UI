name: Publish Plugins to NuGet

on:
  push:
    branches:
      - main
    paths:
      - 'packages/plugins/**'
    paths-ignore:
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.modified, '.github/workflows/')"
    outputs:
      version: ${{ steps.gitversion.outputs.semVer }}
      nuget_version: ${{ steps.gitversion.outputs.nuGetVersionV2 }}
      is_prerelease: ${{ contains(steps.gitversion.outputs.nuGetVersionV2, '-') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v1.1.1
      with:
        versionSpec: '5.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v1.1.1
      with:
        useConfigFile: true
        configFilePath: GitVersion.yml

    - name: Display calculated version
      run: |
        echo "Version: ${{ steps.gitversion.outputs.semVer }}"
        echo "NuGetVersion: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"

    - name: Update csproj version
      run: |
        sed -i 's/<Version>.*<\/Version>/<Version>${{ steps.gitversion.outputs.nuGetVersionV2 }}<\/Version>/' packages/plugins/Ambystech.Elaris.UI.CodeEditor.Plugins/Ambystech.Elaris.UI.CodeEditor.Plugins.csproj

    - name: Restore dependencies
      run: dotnet restore packages/plugins/Ambystech.Elaris.UI.CodeEditor.Plugins/Ambystech.Elaris.UI.CodeEditor.Plugins.csproj

    - name: Build
      run: dotnet build packages/plugins/Ambystech.Elaris.UI.CodeEditor.Plugins/Ambystech.Elaris.UI.CodeEditor.Plugins.csproj --configuration Release --no-restore

    - name: Pack
      run: dotnet pack packages/plugins/Ambystech.Elaris.UI.CodeEditor.Plugins/Ambystech.Elaris.UI.CodeEditor.Plugins.csproj --configuration Release --no-build --output ./artifacts

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package-plugins
        path: ./artifacts/*.nupkg

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: "!contains(github.event.head_commit.modified, '.github/workflows/')"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: nuget-package-plugins
        path: ./artifacts

    - name: Create Git Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "plugins-v${{ needs.build-and-test.outputs.version }}" -m "Release plugins v${{ needs.build-and-test.outputs.version }}"
        git push origin "plugins-v${{ needs.build-and-test.outputs.version }}"

    - name: Publish to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Generate Release Notes
      id: release_notes
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: plugins-v${{ needs.build-and-test.outputs.version }}
        release_name: Release Plugins v${{ needs.build-and-test.outputs.version }}
        body: |
          ## Changes in this Release

          ${{ steps.release_notes.outputs.changelog }}

          ## NuGet Package

          This release is available on NuGet.org:
          ```
          dotnet add package Ambystech.Elaris.UI.CodeEditor.Plugins --version ${{ needs.build-and-test.outputs.nuget_version }}
          ```
        draft: false
        prerelease: ${{ needs.build-and-test.outputs.is_prerelease }}

    - name: Upload NuGet package to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/Ambystech.Elaris.UI.CodeEditor.Plugins.${{ needs.build-and-test.outputs.nuget_version }}.nupkg
        asset_name: Ambystech.Elaris.UI.CodeEditor.Plugins.${{ needs.build-and-test.outputs.nuget_version }}.nupkg
        asset_content_type: application/zip

